<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Friend Puzzle</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    text-align:center;
    margin:0;
    padding:20px;
}

h1{
    color:#333;
}

.friend-btn{
    display:block;
    width:250px;
    margin:10px auto;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#4f46e5;
    color:white;
    font-size:18px;
    cursor:pointer;
}

.friend-btn:hover{
    background:#3730a3;
}

#questionPage,
#puzzlePage{
    display:none;
}

input{
    padding:10px;
    width:250px;
    font-size:16px;
}

button{
    padding:10px 20px;
    cursor:pointer;
}

#puzzle{
    width:300px;
    height:300px;
    margin:20px auto;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:2px;
}

.piece{
    width:100px;
    height:100px;
    border:1px solid #fff;
    cursor:grab;
    background-size:300px 300px;
}

#messagePopup{
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,.3);
    z-index:1000;
}

.overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.5);
}
</style>
</head>

<body>

<div id="homePage">
<h1>Choose Your Name</h1>

<button class="friend-btn" onclick="selectFriend('Aadrika')">Aadrika</button>
<button class="friend-btn" onclick="selectFriend('Kalpna')">Kalpna</button>
<button class="friend-btn" onclick="selectFriend('Abhishek')">Abhishek</button>
<button class="friend-btn" onclick="selectFriend('Modi')">Modi</button>
<button class="friend-btn" onclick="selectFriend('Varun')">Varun</button>
<button class="friend-btn" onclick="selectFriend('Pandey')">Pandey</button>
<button class="friend-btn" onclick="selectFriend('Nimish')">Nimish</button>

</div>

<div id="questionPage">
<h2 id="questionText"></h2>

<input id="answerInput" placeholder="Your answer">
<br><br>

<button onclick="checkAnswer()">Submit</button>
</div>

<div id="puzzlePage">
<h2>Solve the Puzzle</h2>
<div id="puzzle"></div>
</div>

<div class="overlay" id="overlay"></div>

<div id="messagePopup">
<h2 id="finalMessage"></h2>
<button onclick="location.reload()">Done</button>
</div>

<script>

const friends = {

Aadrika:{
question:"what is utay agalpay aihay",
answer:"tu pagal hai",
image:"C:\Users\charv\Downloads\Aadrika.jpeg",
message:"Good job dautali"
},

Kalpna:{
question:"Which dance performance were we partners in, where you played the boy and I played the girl? What was the name of the song? (Search it on YouTube for spelling)",
answer:"peeli lugdi",
image:"C:\Users\charv\Downloads\Kalpna.jpeg",
message:"Waah kalpunesh gzb kr dia"
},

Abhishek:{
question:"What song did you teach us to dance to when we were kids? (Search it on YouTube for spelling)",
answer:"bole chudiyan",
image:"C:\Users\charv\Downloads\Abhishek.jpeg",
message:"Well done leader"
},

Modi:{
question:"Which team is the worst in IPL?",
answer:"csk",
image:"C:\Users\charv\Downloads\modi.jpeg",
message:"Well done Gawar"
},

Varun:{
question:"What scientific term describes two objects moving together, like close friends?",
answer:"pair",
image:"C:\Users\charv\Downloads\varun.jpeg",
message:"Gzb iitian"
},

Pandey:{
question:"Which toffee is my favorite?",
answer:"melody",
image:"C:\Users\charv\Downloads\Pandey.jpeg",
message:"Chalo kuch toh solve kia"
},

Nimish:{
question:"What nickname did my Udaipur friends call me?",
answer:"chars",
image:"C:\Users\charv\Downloads\Nimish.jpeg",
message:"kamal kr diye aap toh"
}

};

let currentFriend;
let dragged;

function selectFriend(name){

currentFriend=name;

document.getElementById("homePage").style.display="none";
document.getElementById("questionPage").style.display="block";

document.getElementById("questionText").innerText=
friends[name].question;
}

function checkAnswer(){

let ans=
document.getElementById("answerInput")
.value
.trim()
.toLowerCase();

if(ans===friends[currentFriend].answer.toLowerCase()){

document.getElementById("questionPage").style.display="none";
document.getElementById("puzzlePage").style.display="block";

createPuzzle();

}else{
alert("Wrong Answer");
}
}

function createPuzzle(){

const puzzle=document.getElementById("puzzle");

puzzle.innerHTML="";

let positions=[];

for(let i=0;i<9;i++){
positions.push(i);
}

positions.sort(()=>Math.random()-0.5);

positions.forEach(pos=>{

let piece=document.createElement("div");

piece.className="piece";

piece.draggable=true;

piece.dataset.correct=pos;

piece.style.backgroundImage=
`url(${friends[currentFriend].image})`;

let x=(pos%3)*100;
let y=Math.floor(pos/3)*100;

piece.style.backgroundPosition=
`-${x}px -${y}px`;

piece.addEventListener("dragstart",()=>{
dragged=piece;
});

piece.addEventListener("dragover",e=>{
e.preventDefault();
});

piece.addEventListener("drop",()=>{

let tempBG=dragged.style.backgroundPosition;
let tempCorrect=dragged.dataset.correct;

dragged.style.backgroundPosition=
piece.style.backgroundPosition;

dragged.dataset.correct=
piece.dataset.correct;

piece.style.backgroundPosition=
tempBG;

piece.dataset.correct=
tempCorrect;

checkPuzzle();

});

puzzle.appendChild(piece);

});
}

function checkPuzzle(){

let pieces=
document.querySelectorAll(".piece");

let solved=true;

pieces.forEach((piece,index)=>{

if(parseInt(piece.dataset.correct)!==index){
solved=false;
}

});

if(solved){

document.getElementById("overlay").style.display="block";

document.getElementById("messagePopup").style.display="block";

document.getElementById("finalMessage").innerText=
friends[currentFriend].message;
}
}

</script>

</body>
</html>
