<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Friend Puzzle</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    text-align:center;
    margin:0;
    padding:20px;
}

h1{
    color:#333;
}

.friend-btn{
    display:block;
    width:250px;
    margin:10px auto;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#4f46e5;
    color:white;
    font-size:18px;
    cursor:pointer;
}

.friend-btn:hover{
    background:#3730a3;
}

#questionPage,
#puzzlePage{
    display:none;
}

input{
    padding:10px;
    width:250px;
    font-size:16px;
}

button{
    padding:10px 20px;
    cursor:pointer;
}

#puzzle{
    width:300px;
    height:300px;
    margin:20px auto;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:2px;
    background:#ccc;
}

.piece{
    width:100px;
    height:100px;
    border:1px solid #fff;
    cursor:pointer;
    background-size:300px 300px;
    box-sizing:border-box;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    font-weight:bold;
    text-shadow:0 0 3px rgba(0,0,0,.7);
    user-select:none;
}

.piece.selected{
    outline:4px solid #4f46e5;
    outline-offset:-4px;
}

#messagePopup{
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,.3);
    z-index:1000;
    max-width:80%;
}

.overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.5);
    z-index:999;
}

#imgWarning{
    color:#b00020;
    font-size:14px;
    max-width:300px;
    margin:10px auto;
}
</style>
</head>

<body>

<div id="homePage">
<h1>Choose Your Name</h1>

<button class="friend-btn" onclick="selectFriend('Aadrika')">Aadrika</button>
<button class="friend-btn" onclick="selectFriend('Kalpna')">Kalpna</button>
<button class="friend-btn" onclick="selectFriend('Abhishek')">Abhishek</button>
<button class="friend-btn" onclick="selectFriend('Modi')">Modi</button>
<button class="friend-btn" onclick="selectFriend('Varun')">Varun</button>
<button class="friend-btn" onclick="selectFriend('Pandey')">Pandey</button>
<button class="friend-btn" onclick="selectFriend('Nimish')">Nimish</button>

</div>

<div id="questionPage">
<h2 id="questionText"></h2>

<input id="answerInput" placeholder="Your answer">
<br><br>

<button onclick="checkAnswer()">Submit</button>
</div>

<div id="puzzlePage">
<h2>Solve the Puzzle</h2>
<p style="font-size:14px;color:#666;">Tap two pieces to swap them</p>
<div id="puzzle"></div>
<div id="imgWarning"></div>
</div>

<div class="overlay" id="overlay"></div>

<div id="messagePopup">
<h2 id="finalMessage"></h2>
<button onclick="location.reload()">Done</button>
</div>

<script>

const friends = {

Aadrika:{
question:"what is utay agalpay aihay",
answer:"tu pagal hai",
image:"Aadrika.jpeg",
message:"Good job dautali"
},

Kalpna:{
question:"Which dance performance were we partners in, where you played the boy and I played the girl? What was the name of the song? (Search it on YouTube for spelling)",
answer:"peeli lugdi",
image:"Kalpna.jpeg",
message:"Waah kalpunesh gzb kr dia"
},

Abhishek:{
question:"What song did you teach us to dance to when we were kids? (Search it on YouTube for spelling)",
answer:"bole chudiyan",
image:"Abhishek.jpeg",
message:"Well done leader"
},

Modi:{
question:"Which team is the worst in IPL?",
answer:"csk",
image:"modi.jpeg",
message:"Well done Gawar"
},

Varun:{
question:"What scientific term describes two objects moving together, like close friends?",
answer:"pair",
image:"varun.jpeg",
message:"Gzb iitian"
},

Pandey:{
question:"Which toffee is my favorite?",
answer:"melody",
image:"Pandey.jpeg",
message:"Chalo kuch toh solve kia"
},

Nimish:{
question:"What nickname did my Udaipur friends call me?",
answer:"chars",
image:"Nimish.jpeg",
message:"kamal kr diye aap toh"
}

};

let currentFriend;
let selectedPiece = null;

function selectFriend(name){

currentFriend = name;

document.getElementById("homePage").style.display = "none";
document.getElementById("questionPage").style.display = "block";

document.getElementById("questionText").innerText =
friends[name].question;
}

function checkAnswer(){

let ans =
document.getElementById("answerInput")
.value
.trim()
.toLowerCase();

if(ans === friends[currentFriend].answer.toLowerCase()){

document.getElementById("questionPage").style.display = "none";
document.getElementById("puzzlePage").style.display = "block";

createPuzzle();

}else{
alert("Wrong Answer");
}
}

function createPuzzle(){

const puzzle = document.getElementById("puzzle");
const warningBox = document.getElementById("imgWarning");

puzzle.innerHTML = "";
warningBox.innerText = "";

let positions = [];

for(let i = 0; i < 9; i++){
positions.push(i);
}

// shuffle, but make sure it's not already solved
let solved = true;
while(solved){
positions.sort(() => Math.random() - 0.5);
solved = positions.every((val, idx) => val === idx);
}

const imgSrc = friends[currentFriend].image;

// check if the image actually loads; if not, warn so it's easy to debug
const testImg = new Image();
testImg.onerror = () => {
warningBox.innerText =
"Couldn't load image: " + imgSrc +
". Check that this file exists in the same folder as index.html on GitHub and that the filename matches exactly (capital letters included).";
};
testImg.src = imgSrc;

positions.forEach(pos => {

let piece = document.createElement("div");

piece.className = "piece";

piece.dataset.correct = pos;

piece.style.backgroundImage = `url(${imgSrc})`;

let x = (pos % 3) * 100;
let y = Math.floor(pos / 3) * 100;

piece.style.backgroundPosition = `-${x}px -${y}px`;

piece.addEventListener("click", () => onPieceClick(piece));

puzzle.appendChild(piece);

});
}

function onPieceClick(piece){

if(selectedPiece === null){
selectedPiece = piece;
piece.classList.add("selected");
return;
}

if(selectedPiece === piece){
// clicked the same piece twice, deselect
piece.classList.remove("selected");
selectedPiece = null;
return;
}

// swap background position and correct-index between the two pieces
let tempBG = selectedPiece.style.backgroundPosition;
let tempCorrect = selectedPiece.dataset.correct;

selectedPiece.style.backgroundPosition = piece.style.backgroundPosition;
selectedPiece.dataset.correct = piece.dataset.correct;

piece.style.backgroundPosition = tempBG;
piece.dataset.correct = tempCorrect;

selectedPiece.classList.remove("selected");
selectedPiece = null;

checkPuzzle();
}

function checkPuzzle(){

let pieces = document.querySelectorAll(".piece");

let solved = true;

pieces.forEach((piece, index) => {
if(parseInt(piece.dataset.correct) !== index){
solved = false;
}
});

if(solved){

document.getElementById("overlay").style.display = "block";
document.getElementById("messagePopup").style.display = "block";

document.getElementById("finalMessage").innerText =
friends[currentFriend].message;
}
}

</script>

</body>
</html>
